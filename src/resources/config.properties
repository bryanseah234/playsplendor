# Splendor Game Configuration
# This file contains all configurable parameters for the game

# Winning conditions
game.points.win=15
game.max_tokens=10

# Player scaling - gems available per player count
game.setup.2p.gems=4
game.setup.3p.gems=5
game.setup.4p.gems=7

# Player scaling - nobles added per player count
game.setup.nobles.add=1

# Network configuration
server.port=8080
network.max_clients=4
network.connection_timeout=30000

# Game settings
game.max_reserved_cards=3
game.min_gems_for_two_same=4
game.max_gems_per_turn=3

# Development settings (can be enabled for debugging)
debug.enabled=false
logging.level=INFO